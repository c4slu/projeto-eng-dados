name: "cripto"
version: "1.0.0"
config-version: 2

# Perfil de conexão (definido em profiles.yml)
profile: "cripto"

model-paths: ["models"]

# Materialização por camada:
#   staging -> view  (transformação leve, sempre fresca)
#   gold    -> table (resultado final, mais rápido de consultar)
models:
  cripto:
    staging:
      +materialized: view
    gold:
      +materialized: table
